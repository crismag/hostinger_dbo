name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, mbstring, json
          coverage: none

      - name: Lint (php -l)
        run: find src public bin tests config -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      # SQLite-backed suites always run. MySQL-dependent suites skip cleanly
      # when no config/database.php (and therefore no MySQL) is available.
      - name: Smoke tests
        run: |
          php tests/gateway_smoke.php
          php tests/hardening_smoke.php
          php tests/query_features_smoke.php
          php tests/driver_matrix_smoke.php
          php tests/service_registry_smoke.php
          php tests/admin_smoke.php
          php tests/migration_smoke.php

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  mysql:
    name: MySQL integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dbo_gateway
          MYSQL_USER: dbo
          MYSQL_PASSWORD: dbo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s --health-timeout=5s --health-retries=15
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, json
          coverage: none

      - name: Install against MySQL
        run: |
          INSTALL_NONINTERACTIVE=1 INSTALL_FORCE=1 \
          DB_DRIVER=mysql DB_HOST=127.0.0.1 DB_PORT=3306 DB_DATABASE=dbo_gateway \
          DB_USERNAME=dbo DB_PASSWORD=dbo INSTALL_WITH_EXAMPLES=1 \
          INSTALL_CLIENT_ID=ci INSTALL_CLIENT_ACTIONS=select,insert,update,delete \
          php bin/install.php

      - name: Query + driver-matrix on real MySQL
        run: |
          php tests/query_features_smoke.php
          php tests/driver_matrix_smoke.php
          php bin/migrate.php status
